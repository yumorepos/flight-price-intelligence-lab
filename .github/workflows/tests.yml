name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        working-directory: ./backend
        run: |
          pip install ruff
          ruff check app/

      - name: Compile backend Python modules
        working-directory: ./backend
        run: |
          python -m py_compile app/main.py app/services/analytics.py app/repositories/analytics.py app/api/intelligence.py app/schemas/intelligence.py

      - name: Run tests
        working-directory: ./backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          pytest tests/ -v --tb=short -W ignore::PendingDeprecationWarning -k "not postgres_repository_roundtrip"

  backend-postgres-integration:
    name: Backend Postgres Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fpi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run postgres integration test
        working-directory: ./backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fpi_test
        run: |
          pytest tests/test_postgres_integration.py -v --tb=short

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run linting
        working-directory: ./frontend
        run: npm run lint

      - name: Run typecheck
        working-directory: ./frontend
        run: npm run typecheck

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Run API contract tests
        working-directory: ./frontend
        run: npm run test:api-contracts

      - name: Install Playwright browsers (including headless shell)
        working-directory: ./frontend
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "0"
        run: npx playwright install --with-deps

      - name: Run UI E2E tests
        working-directory: ./frontend
        run: npm run test:e2e

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
